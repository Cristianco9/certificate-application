services:
  iensch-certification-application-db:
    image: mysql:8.0
    container_name: iensch-certification-application-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3355:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - iensch-certification-application-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: iensch-certification-application-rdbms
    environment:
      PMA_HOST: iensch-certification-application-db
    ports:
      - "8080:80"
    depends_on:
      iensch-certification-application-db:
        condition: service_healthy
    networks:
      - iensch-certification-application-network

  # Descomenta esto si quieres containerizar también tu app Node
  # app:
  #   build: .
  #   container_name: iensch-certification-application-api
  #   env_file: .env
  #   environment:
  #     DB_HOST: iensch-certification-application-db   # nombre del servicio, no 127.0.0.1
  #     DB_PORT: 3306                                    # puerto interno, no 3355
  #   ports:
  #     - "3377:3377"
  #   depends_on:
  #     iensch-certification-application-db:
  #       condition: service_healthy
  #   networks:
  #     - iensch-certification-application-network

volumes:
  db_data:

networks:
  iensch-certification-application-network:
    driver: bridge
